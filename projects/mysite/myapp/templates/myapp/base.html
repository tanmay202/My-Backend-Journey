<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Food App{% endblock %}</title>
</head>

<body class="bg-gray-100 text-gray-800">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-orange-500 flex items-center gap-2">
            🍔 Food Menu
        </h1>

        <div class="flex items-center space-x-4">
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="text-gray-600 font-medium">Welcome, {{ user.username }}</a>
                <a href="{% url 'logout' %}" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition font-semibold text-sm">
                    Logout
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600 transition font-semibold text-sm">
                    Login
                </a>
            {% endif %}
        </div>
    </nav>

    {% if messages %}
    <div class="max-w-5xl mx-auto mt-6 px-4">
        {% for message in messages %}
        <div class="p-4 mb-4 text-sm font-medium rounded-lg 
            {% if message.tags == 'error' %} bg-red-100 text-red-700 
            {% elif message.tags == 'success' %} bg-green-100 text-green-700 
            {% else %} bg-blue-100 text-blue-700 {% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="max-w-5xl mx-auto mt-8 px-4 pb-12">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
