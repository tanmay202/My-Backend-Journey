{% extends 'myapp/base.html' %}

{% block title %}Details{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- Image Section -->
    <div class="w-full h-64 bg-gray-100">
        <img src="{{ item.item_img }}" 
             alt="{{ item.item_name }}"
             class="w-full h-full object-cover">
    </div>

    <!-- Content Section -->
    <div class="p-6">

        <h1 class="text-3xl font-bold text-gray-800 mb-3">
            {{ item.item_name }}
        </h1>

        <p class="text-gray-600 mb-4 leading-relaxed">
            {{ item.item_desc }}
        </p>

        <div class="flex items-center justify-between mt-4">

            <span class="text-2xl font-semibold text-orange-500">
                ₹ {{ item.item_price }}
            </span>

            <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                Stock: {{ item.item_quantity }}
            </span>

        </div>

        <!-- Action Buttons -->
        <div class="mt-6 flex gap-4">

            <!-- Edit Form -->
               <a class="w-full bg-blue-500 text-white py-2 rounded-xl hover:bg-blue-600 transition duration-200" href="{% url 'update_item' item.id %}"><button type="submit"
                        >
                    Edit
                </button>
                </a> 


            <!-- Delete Form -->
                {% csrf_token %}
                <button type="submit"
                        class="w-full bg-red-500 text-white py-2 rounded-xl hover:bg-red-600 transition duration-200">
                    Delete
                </button>


        </div>

    </div>

</div>

{% endblock %}
